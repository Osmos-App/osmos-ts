  <text x="58" y="116" fill="#f4fbf8" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="56" font-weight="700" letter-spacing="-2">Osmos Desktop</text>
  <text x="58" y="158" fill="#bed2cc" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="21">The cross-platform shell for a future local-first version-control interface.</text>
